<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Promociones Aéreas Liberty</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f2f5f9;
}

header{
background:linear-gradient(120deg,#0B3C8A,#1A73E8);
color:white;
text-align:center;
padding:50px 20px;
}

header h1{
margin:0;
font-size:34px;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:translateY(-4px);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card-body{
padding:12px;
}

.badge{
background:#1A73E8;
color:white;
font-size:11px;
padding:3px 8px;
border-radius:6px;
display:inline-block;
}

.route{
font-size:16px;
font-weight:600;
margin-top:6px;
}

.company{
font-size:13px;
color:#777;
}

.price{
font-size:18px;
font-weight:700;
color:#0B3C8A;
margin-top:6px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
display:none;
justify-content:center;
align-items:center;
padding:20px;
}

.modal-box{
background:white;
border-radius:16px;
max-width:520px;
width:100%;
overflow:hidden;
animation:fade .3s;
}

.modal-img{
width:100%;
height:220px;
object-fit:cover;
}

.modal-content{
padding:25px;
}

.modal-content h2{
margin-top:0;
}

.info{
margin:8px 0;
}

.price-big{
font-size:28px;
font-weight:700;
color:#0B3C8A;
margin-top:10px;
}

.buttons{
margin-top:20px;
}

.btn{
display:inline-block;
padding:12px 20px;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:500;
}

.mail{
background:#1A73E8;
}

.whatsapp{
background:#25D366;
margin-left:10px;
}

.close{
position:absolute;
margin:10px;
background:white;
border-radius:50%;
width:32px;
height:32px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:600;
}

@keyframes fade{
from{transform:scale(.9);opacity:0}
to{transform:scale(1);opacity:1}
}

</style>

</head>

<body>

<header>

<h1>✈️ Promociones Aéreas Liberty</h1>
<p>Cupos exclusivos para agencias</p>

</header>

<div class="container" id="cards"></div>

<div class="modal" id="modal">

<div class="modal-box">

<div class="close" onclick="cerrar()">✕</div>

<div id="modalContent"></div>

</div>

</div>

<script>

const csv="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv";

let promos=[];

fetch(csv)
.then(res=>res.text())
.then(data=>{

let filas=data.split("\n").slice(1);

filas.forEach(f=>{

let c=f.split(",");

promos.push({

origen:c[0],
destino:c[1],
compania:c[2],
salida:c[3],
regreso:c[4],
disp:c[5],
tarifa:c[6],
equipaje:c[7],
imagen:"https://source.unsplash.com/800x500/?"+c[1]+",travel"

});

});

render();

});

function render(){

let html="";

promos.forEach((p,i)=>{

html+=`

<div class="card" onclick="abrir(${i})">

<img src="${p.imagen}">

<div class="card-body">

<span class="badge">Promo</span>

<div class="route">${p.origen} → ${p.destino}</div>

<div class="company">${p.compania}</div>

<div class="price">USD ${p.tarifa}</div>

</div>

</div>

`;

});

document.getElementById("cards").innerHTML=html;

}

function abrir(i){

let p=promos[i];

let html=`

<img class="modal-img" src="${p.imagen}">

<div class="modal-content">

<h2>${p.origen} → ${p.destino}</h2>

<div class="info">✈️ <b>Compañía:</b> ${p.compania}</div>
<div class="info">🛫 <b>Salida:</b> ${p.salida}</div>
<div class="info">🛬 <b>Regreso:</b> ${p.regreso}</div>
<div class="info">🎟 <b>Cupos:</b> ${p.disp}</div>
<div class="info">🧳 <b>Equipaje:</b> ${p.equipaje}</div>

<div class="price-big">USD ${p.tarifa}</div>

<div class="buttons">

<a class="btn mail" href="mailto:TUEMAIL@MAIL.COM?subject=Consulta promo ${p.origen}-${p.destino}">
Consultar por Mail
</a>

<a class="btn whatsapp" href="https://wa.me/598XXXXXXXX?text=Hola quiero consultar la promo ${p.origen}-${p.destino}">
WhatsApp
</a>

</div>

</div>

`;

document.getElementById("modalContent").innerHTML=html;

document.getElementById("modal").style.display="flex";

}

function cerrar(){

document.getElementById("modal").style.display="none";

}

</script>

</body>
</html>
