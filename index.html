<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Cupos Liberty</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f4f6fb;
margin:0;
}

header{
background:#0b3a6f;
padding:15px;
}

.headerbox{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
color:white;
font-size:22px;
font-weight:600;
}

header img{
height:50px;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:14px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:all .35s ease;
animation:fadeUp .6s ease;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.plane{
width:100%;
height:60px;
object-fit:contain;
background:white;
border-radius:10px;
margin-bottom:15px;
padding:5px;
}

.route{
font-size:22px;
font-weight:600;
color:#0b3a6f;
text-align:center;
margin-bottom:15px;
}

.flight{
background:#eef3fb;
padding:12px;
border-radius:8px;
margin-bottom:10px;
}

.flighttitle{
font-weight:600;
margin-bottom:6px;
color:#0b3a6f;
}

.flightline{
font-size:14px;
letter-spacing:0.2px;
line-height:1.6;
color:#333;
}

.info{
margin-top:6px;
font-size:14px;
}

.price{
font-size:22px;
font-weight:600;
color:#0b3a6f;
margin-top:10px;
}

.mailbtn{
margin-top:12px;
background:#0b3a6f;
color:white;
border:none;
padding:11px;
border-radius:7px;
cursor:pointer;
width:100%;
font-weight:600;
transition:.25s;
}

.mailbtn:hover{
background:#072a52;
}

</style>
</head>

<body>

<header>
<div class="headerbox">
<img src="liberty.png">
<span>Cupos Aéreos Disponibles</span>
</div>
</header>

<div class="container">
<div class="grid" id="cards"></div>
</div>

<script>

const CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

// 🔥 CONVERSOR DE GOOGLE DRIVE
function convertirDrive(url){

if(!url) return ""

url = url.trim()

if(url.includes("drive.google.com")){

let id = url.match(/\/d\/(.*?)\//)

if(id && id[1]){
return `https://drive.google.com/uc?export=view&id=${id[1]}`
}

}

return url
}

fetch(CSV)
.then(r=>r.text())
.then(data=>{

let rows=data.split("\n").slice(2).map(r=>{

let cols=r.split(",")

while(cols.length<18){
cols.push("")
}

return cols

})

for(let i=0;i<rows.length;i+=2){

let ida=rows[i]
let regreso=rows[i+1]

if(!regreso) break

let origen=ida[1]
let destino=ida[2]

// ✅ LOGO DESDE COLUMNA R + CONVERSIÓN DRIVE
let logo = convertirDrive(ida[17]) || "https://via.placeholder.com/120x60?text=Airline"

let idaLinea=`${origen} → ${destino} | ${ida[3]} | ${ida[4]} | ${ida[5]}-${ida[6]}`

let idaEscala=""
let escalaDestino=destino

if(ida[0]=="SI"){

escalaDestino=ida[8]

idaEscala=`${ida[7]} → ${ida[8]} | ${ida[9]} | ${ida[10]} | ${ida[11]}-${ida[12]}`

}

let regresoLinea=`${regreso[1]} → ${regreso[2]} | ${regreso[3]} | ${regreso[4]} | ${regreso[5]}-${regreso[6]}`

let regresoEscala=""

if(regreso[0]=="SI"){

regresoEscala=`${regreso[7]} → ${regreso[8]} | ${regreso[9]} | ${regreso[10]} | ${regreso[11]}-${regreso[12]}`

}

let cupos=ida[13]
let precio=ida[14]
let equipaje=ida[15]

crearCard(origen,escalaDestino,idaLinea,idaEscala,regresoLinea,regresoEscala,cupos,precio,equipaje,logo)

}

})

function crearCard(origen,destino,ida,idaEscala,regreso,regresoEscala,cupos,precio,equipaje,logo){

let asunto=`${origen} - ${destino}`

let cuerpo=`Ruta: ${origen} - ${destino}

IDA
${ida}
${idaEscala}

REGRESO
${regreso}
${regresoEscala}

Equipaje: ${equipaje}
Tarifa: USD ${precio}
Cupos disponibles: ${cupos}
`

let card=`

<div class="card">

<img class="plane" src="${logo}">

<div class="route">${origen} - ${destino}</div>

<div class="flight">
<div class="flighttitle">✈ IDA</div>
<div class="flightline">${ida}</div>
${idaEscala ? `<div class="flightline">${idaEscala}</div>`:""}
</div>

<div class="flight">
<div class="flighttitle">✈ REGRESO</div>
<div class="flightline">${regreso}</div>
${regresoEscala ? `<div class="flightline">${regresoEscala}</div>`:""}
</div>

<div class="info">Equipaje: ${equipaje}</div>
<div class="info">Cupos disponibles: ${cupos}</div>

<div class="price">USD ${precio}</div>

<button class="mailbtn" onclick="consultar('${asunto}',\`${cuerpo}\`)">
Consultar por Mail
</button>

</div>
`

document.getElementById("cards").innerHTML+=card

}

function consultar(asunto,cuerpo){

let cantidad=prompt("¿Cuántos cupos deseas reservar?")

if(!cantidad) return

let mensaje=cuerpo + `

Cupos solicitados: ${cantidad}
`

let mail=`mailto:jose@libertyuruguay.com.uy?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(mensaje)}`

window.location.href=mail

}

</script>

</body>
</html>
