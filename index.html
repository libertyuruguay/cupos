<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Cupos Liberty</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

header{
background:#0b3a6f;
padding:15px;
text-align:center;
}

header img{
height:55px;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.route{
font-size:22px;
font-weight:bold;
color:#0b3a6f;
margin-bottom:15px;
}

.flight{
background:#f1f4f9;
padding:12px;
border-radius:8px;
margin-bottom:10px;
font-size:14px;
}

.info{
margin-top:6px;
font-size:14px;
}

.price{
font-size:24px;
font-weight:bold;
color:#0b3a6f;
margin-top:10px;
}

</style>

</head>

<body>

<header>
<img src="liberty.png">
</header>

<div class="container">
<div class="grid" id="cards"></div>
</div>

<script>

const CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

fetch(CSV)
.then(r=>r.text())
.then(data=>{

let rows=data.split("\n").slice(2).map(r=>r.split(","))

for(let i=0;i<rows.length;i+=2){

let ida=rows[i]
let regreso=rows[i+1]

if(!regreso) break

let escala=ida[0]

let origen=ida[1]
let destino=ida[2]

let idaInfo=`${ida[3]} ${ida[4]} ${ida[5]}-${ida[6]}`

let escalaInfo=""

if(escala=="SI"){

escalaInfo=`
<br><b>Escala</b><br>
${ida[7]} → ${ida[8]}<br>
${ida[9]} ${ida[10]} ${ida[11]}-${ida[12]}
`
}

let regresoInfo=`${regreso[3]} ${regreso[4]} ${regreso[5]}-${regreso[6]}`

let cupos=ida[13]
let precio=ida[14]
let equipaje=ida[15]

crearCard(origen,destino,idaInfo,escalaInfo,regresoInfo,cupos,precio,equipaje)

}

})

function crearCard(origen,destino,ida,escala,regreso,cupos,precio,equipaje){

let card=`

<div class="card">

<div class="route">${origen} ✈ ${destino}</div>

<div class="flight">
<b>IDA</b><br>
${ida}
${escala}
</div>

<div class="flight">
<b>REGRESO</b><br>
${regreso}
</div>

<div class="info">Equipaje: ${equipaje}</div>
<div class="info">Cupos disponibles: ${cupos}</div>

<div class="price">USD ${precio}</div>

</div>
`

document.getElementById("cards").innerHTML+=card

}

</script>

</body>
</html>
