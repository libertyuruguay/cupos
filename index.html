<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cupos Aéreos Liberty</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f5fb;
}

.header{
background:#0B3C8A;
color:white;
padding:18px;
display:flex;
align-items:center;
justify-content:center;
gap:15px;
font-size:22px;
font-weight:bold;
}

.logo{
height:45px;
}

.topbar{
max-width:1200px;
margin:auto;
padding:20px;
}

.topbar input{
padding:12px;
border-radius:8px;
border:1px solid #ddd;
width:260px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:130px;
object-fit:cover;
}

.card-body{
padding:12px;
}

.route{
font-weight:600;
font-size:16px;
}

.company{
display:flex;
align-items:center;
gap:6px;
font-size:13px;
color:#666;
margin-top:4px;
}

.airlogo{
height:18px;
width:auto;
}

.price{
font-size:18px;
font-weight:bold;
color:#0B3C8A;
margin-top:6px;
}

.badge{
background:#ff4d4d;
color:white;
font-size:11px;
padding:4px 8px;
border-radius:6px;
display:inline-block;
margin-top:5px;
}

.bar{
height:6px;
background:#eee;
border-radius:4px;
margin-top:6px;
overflow:hidden;
}

.bar div{
height:6px;
background:#ff4d4d;
}

</style>
</head>

<body>

<div class="header">
<img src="_Logotipo Liberty Blanco-01.png" class="logo">
<span>Cupos Aéreos Disponibles</span>
</div>

<div class="topbar">
<input id="search" placeholder="Buscar destino, origen o compañía">
</div>

<div class="container" id="lista"></div>

<script>

let url="TU LINK CSV DE GOOGLE SHEETS"

let promos=[]

let logos={
"LA":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/LATAM_Airlines_logo.svg/200px-LATAM_Airlines_logo.svg.png",
"G3":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Gol_Linhas_A%C3%A9reas_logo.svg/200px-Gol_Linhas_A%C3%A9reas_logo.svg.png",
"AR":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7f/Aerol%C3%ADneas_Argentinas_logo.svg/200px-Aerol%C3%ADneas_Argentinas_logo.svg.png",
"CM":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7d/Copa_Airlines_logo.svg/200px-Copa_Airlines_logo.svg.png"
}

fetch(url)
.then(r=>r.text())
.then(data=>{

let rows=data.split("\n").slice(1)

rows.forEach(r=>{

let c=r.split(",")

promos.push({
origen:c[0],
destino:c[1],
compania:c[2],
salida:c[3],
regreso:c[4],
disp:parseInt(c[5]),
tarifa:parseInt(c[6]),
equipaje:c[7]
})

})

mostrar()

})

function mostrar(){

let cont=document.getElementById("lista")
cont.innerHTML=""

let filtro=document.getElementById("search").value.toLowerCase()

let lista=promos.filter(p=>

p.destino.toLowerCase().includes(filtro) ||
p.origen.toLowerCase().includes(filtro) ||
p.compania.toLowerCase().includes(filtro)

)

lista.forEach((p)=>{

cont.innerHTML+=card(p)

})

}

function card(p){

let logo=logos[p.compania] || ""

let badge=p.disp<=5?`<div class="badge">Últimos ${p.disp}</div>`:""

let bar=Math.min(100,(p.disp/20)*100)

return`

<div class="card">

<img src="avion-cupos.png">

<div class="card-body">

<div class="route">${p.origen} → ${p.destino}</div>

<div class="company">
${logo?`<img class="airlogo" src="${logo}">`:``}
${p.compania}
</div>

<div class="price">USD ${p.tarifa}</div>

${badge}

<div class="bar">
<div style="width:${bar}%"></div>
</div>

</div>

</div>

`

}

document.getElementById("search").addEventListener("keyup",mostrar)

</script>

</body>
</html>
