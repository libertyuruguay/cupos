<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cupos Liberty</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f4f6fb;
margin:0;
}

header{
background:#0b3a6f;
padding:15px;
color:white;
text-align:center;
font-size:22px;
font-weight:600;
}

/* CARD */
.container{
max-width:1100px;
margin:auto;
padding:25px;
}

.card{
background:white;
border-radius:10px;
display:flex;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
margin-bottom:20px;
}

/* LEFT */
.left{
flex:3;
padding:20px;
}

.topline{
font-size:13px;
color:#666;
margin-bottom:10px;
}

.flightrow{
display:flex;
align-items:center;
justify-content:space-between;
}

.timeblock{
text-align:left;
}

.time{
font-size:22px;
font-weight:600;
}

.city{
font-size:13px;
color:#666;
}

.center{
text-align:center;
flex:1;
}

.duration{
font-size:13px;
color:#666;
margin-bottom:5px;
}

.line{
height:2px;
background:#ccc;
position:relative;
}

.dot{
width:8px;
height:8px;
background:#ccc;
border-radius:50%;
position:absolute;
top:-3px;
left:0;
}

.dot.end{
left:100%;
transform:translateX(-100%);
}

.airline{
font-size:12px;
color:#666;
margin-top:10px;
}

.details{
font-size:13px;
color:#0b3a6f;
cursor:pointer;
margin-top:5px;
display:inline-block;
}

/* RIGHT */
.right{
flex:1;
border-left:1px solid #eee;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
position:relative;
}

.pricebar{
position:absolute;
top:0;
left:0;
height:4px;
width:100%;
background:#0b3a6f;
}

.price{
font-size:24px;
font-weight:700;
color:#0b3a6f;
}

.subprice{
font-size:13px;
color:#666;
margin-bottom:10px;
}

.btn{
background:#0b3a6f;
color:white;
border:none;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.btn:hover{
background:#072a52;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
border-radius:10px;
width:500px;
max-width:90%;
padding:20px;
}

.close{
float:right;
cursor:pointer;
}

.timeline{
border-left:2px solid #ddd;
padding-left:15px;
margin-top:20px;
}

.stop{
margin-bottom:20px;
}

.stop b{
color:#0b3a6f;
}

.scale{
background:#eef3fb;
padding:10px;
border-radius:8px;
font-size:13px;
}

</style>
</head>

<body>

<header>Cupos Aéreos Liberty</header>

<div class="container" id="cards"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="cerrarModal()">✖</span>
<h3>Detalles de Vuelo</h3>
<div class="timeline" id="detalle"></div>
</div>
</div>

<script>

const CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

fetch(CSV)
.then(r=>r.text())
.then(data=>{

let rows=data.split("\n").slice(2).map(r=>r.split(","))

for(let i=0;i<rows.length;i+=2){

let ida=rows[i]
let regreso=rows[i+1]
if(!regreso) break

crearCard(ida, regreso)

}

})

function crearCard(ida, regreso){

let origen=ida[1]
let destino=ida[2]

let salida=ida[5]
let llegada=ida[6]

let escalaTexto = ida[0]=="SI" ? `Escala en ${ida[8]}` : "Directo"

let precio=ida[14]

let detalle=generarDetalle(ida, regreso)

let card=`
<div class="card">

<div class="left">

<div class="topline">${ida[3]} • ${escalaTexto}</div>

<div class="flightrow">

<div class="timeblock">
<div class="time">${salida}</div>
<div class="city">${origen}</div>
</div>

<div class="center">
<div class="duration">Duración</div>
<div class="line">
<div class="dot"></div>
<div class="dot end"></div>
</div>
</div>

<div class="timeblock" style="text-align:right;">
<div class="time">${llegada}</div>
<div class="city">${destino}</div>
</div>

</div>

<div class="airline">Operado por ${ida[3]}</div>
<div class="details" onclick='abrirModal(\`${detalle}\`)'>Ver detalles</div>

</div>

<div class="right">
<div class="pricebar"></div>
<div class="price">USD ${precio}</div>
<div class="subprice">Económica</div>
<button class="btn" onclick="consultar('${origen}-${destino}')">Consultar</button>
</div>

</div>
`

document.getElementById("cards").innerHTML+=card

}

function generarDetalle(ida, regreso){

let escala = ida[0]=="SI" ? `
<div class="scale">
Escala en ${ida[8]}
</div>` : ""

return `

<div class="stop">
<b>${ida[5]} - ${ida[1]}</b>
Vuelo ${ida[3]}
</div>

<div class="stop">
<b>${ida[6]} - ${ida[2]}</b>
</div>

${escala}

<div class="stop">
<b>${regreso[5]} - ${regreso[1]}</b>
Vuelo ${regreso[3]}
</div>

<div class="stop">
<b>${regreso[6]} - ${regreso[2]}</b>
</div>

`

}

function abrirModal(html){
document.getElementById("modal").style.display="flex"
document.getElementById("detalle").innerHTML=html
}

function cerrarModal(){
document.getElementById("modal").style.display="none"
}

function consultar(ruta){
let cant=prompt("¿Cuántos cupos?")
if(!cant) return
window.location.href=`mailto:jose@libertyuruguay.com.uy?subject=${ruta}&body=Cupos: ${cant}`
}

</script>

</body>
</html>
