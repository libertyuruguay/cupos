<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cupos Aéreos Liberty</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

header{
background:#0B3C8A;
padding:20px;
display:flex;
align-items:center;
gap:20px;
}

header img{
height:50px;
}

header h1{
color:white;
margin:0;
font-size:22px;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(350px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-content{
padding:18px;
}

.title{
font-size:22px;
font-weight:700;
color:#0B3C8A;
margin-bottom:12px;
}

.flights{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.box{
background:#f1f3f6;
padding:10px;
border-radius:6px;
font-size:13px;
}

.box b{
color:#0B3C8A;
}

.details{
margin-top:12px;
font-size:13px;
line-height:1.6;
}

.price{
font-size:26px;
font-weight:700;
color:#0B3C8A;
margin-top:10px;
}

.buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:6px;
font-size:13px;
font-weight:600;
cursor:pointer;
color:white;
}

.mail{background:#1a73e8;}
.whatsapp{background:#25D366;}

</style>

</head>

<body>

<header>

<img src="liberty.png">

<h1>Cupos Aéreos Liberty</h1>

</header>

<div class="container">

<div class="grid" id="resultados"></div>

</div>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

let promos=[]

Papa.parse(csvURL,{

download:true,

complete:function(results){

let rows=results.data.slice(2)

for(let i=0;i<rows.length;i+=2){

let impar=rows[i]
let par=rows[i+1]

if(!impar || !par) continue

let escala=impar[0]

let card={}

if(escala=="SI"){

card.tipo="escala"

card.destino=par[2]

card.tramo1={
origen:impar[1],
destino:impar[2],
compania:impar[3],
fecha:impar[4],
salida:impar[5],
llegada:impar[6]
}

card.tramo2={
origen:par[1],
destino:par[2],
compania:par[3],
fecha:par[4],
salida:par[5],
llegada:par[6]
}

card.cupos=par[7]
card.tarifa=par[8]
card.equipaje=par[9]

}else{

card.tipo="directo"

card.destino=par[2]

card.ida={
origen:impar[1],
destino:impar[2],
compania:impar[3],
fecha:impar[4],
salida:impar[5],
llegada:impar[6]
}

card.regreso={
origen:par[1],
destino:par[2],
compania:par[3],
fecha:par[4],
salida:par[5],
llegada:par[6]
}

card.cupos=par[7]
card.tarifa=par[8]
card.equipaje=par[9]

}

promos.push(card)

}

mostrar()

}

})

function mostrar(){

let html=""

promos.forEach(p=>{

let idaHTML=""
let regresoHTML=""

if(p.tipo=="escala"){

idaHTML=`

<b>IDA</b><br>

${p.tramo1.compania}<br>
${p.tramo1.origen} → ${p.tramo1.destino}<br>
${p.tramo1.fecha}<br>
${p.tramo1.salida} - ${p.tramo1.llegada}

<hr>

ESCALA<br>

${p.tramo2.compania}<br>
${p.tramo2.origen} → ${p.tramo2.destino}<br>
${p.tramo2.fecha}<br>
${p.tramo2.salida} - ${p.tramo2.llegada}

`

regresoHTML=`<b>REGRESO</b><br>No aplica`

}else{

idaHTML=`

<b>IDA</b><br>

${p.ida.compania}<br>
${p.ida.origen} → ${p.ida.destino}<br>
${p.ida.fecha}<br>
${p.ida.salida} - ${p.ida.llegada}

`

regresoHTML=`

<b>REGRESO</b><br>

${p.regreso.compania}<br>
${p.regreso.origen} → ${p.regreso.destino}<br>
${p.regreso.fecha}<br>
${p.regreso.salida} - ${p.regreso.llegada}

`

}

html+=`

<div class="card">

<img src="avion-cupos.png">

<div class="card-content">

<div class="title">${p.destino}</div>

<div class="flights">

<div class="box">
${idaHTML}
</div>

<div class="box">
${regresoHTML}
</div>

</div>

<div class="details">

Equipaje: ${p.equipaje}<br>
Cupos disponibles: ${p.cupos}

</div>

<div class="price">

USD ${p.tarifa}

</div>

<div class="buttons">

<button class="btn mail" onclick='mail(${JSON.stringify(p)})'>
Consultar
</button>

<button class="btn whatsapp" onclick='whatsapp(${JSON.stringify(p)})'>
WhatsApp
</button>

</div>

</div>

</div>

`

})

document.getElementById("resultados").innerHTML=html

}

function mail(p){

let cupos=prompt("¿Cuántos cupos desean reservar?")

if(!cupos)return

let asunto=p.destino

let cuerpo="Consulta cupos aéreos para "+p.destino+"\n\nCupos solicitados: "+cupos

window.location.href=`mailto:ventas@libertyuruguay.com.uy?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`

}

function whatsapp(p){

let msg=`Consulta cupos ${p.destino}`

window.open(`https://wa.me/598XXXXXXXX?text=${encodeURIComponent(msg)}`)

}

</script>

</body>

</html>
