<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Cupos Aéreos Liberty</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#f4f7fb;
margin:0;
}

header{
background:linear-gradient(135deg,#0B3C8A,#1A73E8);
color:white;
text-align:center;
padding:50px;
font-size:28px;
font-weight:600;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.route{
font-weight:600;
font-size:18px;
}

.company{
color:#777;
font-size:14px;
}

.price{
margin-top:10px;
font-size:20px;
font-weight:600;
color:#0B3C8A;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:30px;
border-radius:12px;
max-width:500px;
width:90%;
}

.btn{
display:inline-block;
margin-top:15px;
padding:12px 20px;
border-radius:8px;
text-decoration:none;
color:white;
}

.mail{
background:#1A73E8;
}

.whatsapp{
background:#25D366;
margin-left:10px;
}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

</style>

</head>

<body>

<header>
✈️ Promociones Aéreas Liberty
</header>

<div class="container" id="cards"></div>

<div class="modal" id="modal">

<div class="modal-content">

<span class="close" onclick="cerrar()">✖</span>

<div id="modalInfo"></div>

</div>

</div>

<script>

const csv="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv";

let vuelos=[];

fetch(csv)
.then(res=>res.text())
.then(data=>{

let filas=data.split("\n").slice(1);

filas.forEach(f=>{

let c=f.split(",");

let vuelo={
origen:c[0],
destino:c[1],
compania:c[2],
salida:c[3],
regreso:c[4],
disponibilidad:c[5],
tarifa:c[6],
equipaje:c[7],
imagen:"https://source.unsplash.com/600x400/?airplane,travel"
};

vuelos.push(vuelo);

});

crearCards();

});

function crearCards(){

let html="";

vuelos.forEach((v,i)=>{

html+=`

<div class="card" onclick="abrir(${i})">

<img src="${v.imagen}">

<div class="card-body">

<div class="route">${v.origen} → ${v.destino}</div>

<div class="company">${v.compania}</div>

<div class="price">USD ${v.tarifa}</div>

</div>

</div>

`;

});

document.getElementById("cards").innerHTML=html;

}

function abrir(i){

let v=vuelos[i];

let texto=`
<h2>${v.origen} → ${v.destino}</h2>

<p><b>Compañía:</b> ${v.compania}</p>
<p><b>Salida:</b> ${v.salida}</p>
<p><b>Regreso:</b> ${v.regreso}</p>
<p><b>Disponibilidad:</b> ${v.disponibilidad}</p>
<p><b>Equipaje:</b> ${v.equipaje}</p>
<p><b>Tarifa:</b> USD ${v.tarifa}</p>

<a class="btn mail" href="mailto:MAIL@LIBERTY.COM?subject=Consulta ${v.origen}-${v.destino}">
Consultar por Mail
</a>

<a class="btn whatsapp" href="https://wa.me/NUMERO?text=Consulta ${v.origen}-${v.destino}">
WhatsApp
</a>
`;

document.getElementById("modalInfo").innerHTML=texto;

document.getElementById("modal").style.display="flex";

}

function cerrar(){

document.getElementById("modal").style.display="none";

}

</script>

</body>
</html>
