<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cupos Aéreos</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

header{
background:#0b3a6f;
padding:18px;
text-align:center;
}

header img{
height:55px;
}

.container{
max-width:1300px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-body{
padding:18px;
}

.route{
font-size:22px;
font-weight:bold;
color:#0b3a6f;
margin-bottom:12px;
}

.boxes{
display:flex;
gap:10px;
}

.box{
flex:1;
background:#f1f4f9;
padding:12px;
border-radius:8px;
font-size:13px;
}

.info{
margin-top:10px;
font-size:14px;
}

.price{
font-size:22px;
color:#0b3a6f;
font-weight:bold;
margin-top:8px;
}

.buttons{
display:flex;
gap:10px;
margin-top:12px;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-weight:bold;
}

.mail{background:#0b3a6f;}
.wa{background:#25D366;}

</style>
</head>

<body>

<header>
<img src="liberty.png">
</header>

<div class="container">
<div class="grid" id="cards"></div>
</div>

<script>

const CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

fetch(CSV)
.then(r=>r.text())
.then(data=>{

let rows=data.split("\n").slice(2).map(r=>r.split(","))

let container=document.getElementById("cards")

for(let i=0;i<rows.length;){

let escala=(rows[i][0]||"").trim().toUpperCase()

// CASO ESCALA
if(escala==="SI"){

let ida1=rows[i]
let ida2=rows[i+1]

let reg1=rows[i+2]
let reg2=rows[i+3]

let origen=ida1[1]
let destino=ida2[2]

let ida=`
${ida1[3]} ${ida1[4]} ${ida1[5]}-${ida1[6]}<br>
Escala ${ida2[1]}<br>
${ida2[3]} ${ida2[4]} ${ida2[5]}-${ida2[6]}
`

let regreso=`
${reg1[3]} ${reg1[4]} ${reg1[5]}-${reg1[6]}<br>
Escala ${reg2[1]}<br>
${reg2[3]} ${reg2[4]} ${reg2[5]}-${reg2[6]}
`

let cupos=reg2[7]
let precio=reg2[8]
let equipaje=reg2[9]

crearCard(origen,destino,ida,regreso,cupos,precio,equipaje)

i+=4

}

// SIN ESCALA
else{

let idaRow=rows[i]
let regRow=rows[i+1]

let origen=idaRow[1]
let destino=idaRow[2]

let ida=`
${idaRow[3]} ${idaRow[4]} ${idaRow[5]}-${idaRow[6]}
`

let regreso=`
${regRow[3]} ${regRow[4]} ${regRow[5]}-${regRow[6]}
`

let cupos=regRow[7]
let precio=regRow[8]
let equipaje=regRow[9]

crearCard(origen,destino,ida,regreso,cupos,precio,equipaje)

i+=2

}

}

})

function crearCard(origen,destino,ida,regreso,cupos,precio,equipaje){

let asunto=`Consulta cupos ${origen} ${destino}`

let cuerpo=`Ruta ${origen} ${destino}

IDA
${ida}

REGRESO
${regreso}

Equipaje: ${equipaje}
Precio: ${precio}
Cupos: ${cupos}

Cantidad de cupos que deseo reservar:
`

let mail=`mailto:ventas@liberty.com.uy?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`

let wa=`https://wa.me/59800000000?text=${encodeURIComponent(asunto)}`

let card=`

<div class="card">

<img src="avion-cupos.png">

<div class="card-body">

<div class="route">${origen} ✈ ${destino}</div>

<div class="boxes">

<div class="box">
<b>IDA</b><br>
${ida}
</div>

<div class="box">
<b>REGRESO</b><br>
${regreso}
</div>

</div>

<div class="info">Equipaje: ${equipaje}</div>
<div class="info">Cupos disponibles: ${cupos}</div>

<div class="price">${precio}</div>

<div class="buttons">

<button class="btn mail" onclick="window.location.href='${mail}'">
Consultar Mail
</button>

<button class="btn wa" onclick="window.open('${wa}')">
WhatsApp
</button>

</div>

</div>

</div>
`

document.getElementById("cards").innerHTML+=card

}

</script>

</body>
</html>
