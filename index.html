<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cupos Aéreos Liberty</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

header{
background:#0B3C8A;
padding:20px;
display:flex;
align-items:center;
gap:20px;
}

header img{
height:50px;
}

header h1{
color:white;
margin:0;
font-size:22px;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.search{
margin-bottom:25px;
}

.search input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
transition:0.25s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 14px 30px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-content{
padding:18px;
}

.route{
font-size:20px;
font-weight:700;
color:#0B3C8A;
}

.airline{
margin-top:8px;
display:flex;
align-items:center;
gap:6px;
font-size:13px;
}

.airlogo{
height:16px;
}

.details{
font-size:13px;
margin-top:10px;
line-height:1.6;
}

.price{
font-size:26px;
font-weight:700;
color:#0B3C8A;
margin-top:12px;
}

.buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:6px;
font-size:13px;
font-weight:600;
cursor:pointer;
color:white;
}

.mail{
background:#1a73e8;
}

.whatsapp{
background:#25D366;
}

</style>

</head>

<body>

<header>

<img src="liberty.png">

<h1>Cupos Aéreos Liberty</h1>

</header>

<div class="container">

<div class="search">
<input id="buscador" placeholder="Buscar destino..." onkeyup="buscar()">
</div>

<div class="grid" id="resultados"></div>

</div>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

const logos={
"LA":"https://upload.wikimedia.org/wikipedia/commons/8/8b/LATAM_Airlines_logo.svg",
"G3":"https://upload.wikimedia.org/wikipedia/commons/6/6d/GOL_Linhas_A%C3%A9reas_logo.svg",
"AD":"https://upload.wikimedia.org/wikipedia/commons/f/f4/Azul_Brazilian_Airlines_logo.svg"
}

let promos=[]

fetch(csvURL)
.then(r=>r.text())
.then(t=>{

let rows=t.split("\n").slice(2)

rows.forEach(r=>{

let c=r.split(",")

if(c.length<9)return

promos.push({

origen:c[0],
destino:c[1],
compania:c[2],
fecha:c[3],
salida:c[4],
llegada:c[5],
cupos:c[6],
tarifa:c[7],
equipaje:c[8]

})

})

mostrar(promos)

})

function mostrar(data){

let html=""

data.forEach(p=>{

let logo=logos[p.compania]||""

html+=`

<div class="card">

<img src="avion-cupos.png">

<div class="card-content">

<div class="route">${p.origen} ✈ ${p.destino}</div>

<div class="airline">

${logo?`<img class="airlogo" src="${logo}">`:``}

${p.compania}

</div>

<div class="details">

Fecha: ${p.fecha}<br>

Salida: ${p.salida}<br>

Llegada: ${p.llegada}<br>

Equipaje: ${p.equipaje}<br>

Cupos disponibles: ${p.cupos}

</div>

<div class="price">

USD ${p.tarifa}

</div>

<div class="buttons">

<button class="btn mail" onclick='mail(${JSON.stringify(p)})'>
Consultar
</button>

<button class="btn whatsapp" onclick='whatsapp(${JSON.stringify(p)})'>
WhatsApp
</button>

</div>

</div>

</div>

`

})

document.getElementById("resultados").innerHTML=html

}

function buscar(){

let q=document.getElementById("buscador").value.toLowerCase()

let f=promos.filter(p=>

p.destino.toLowerCase().includes(q) ||
p.origen.toLowerCase().includes(q)

)

mostrar(f)

}

function mail(p){

let cupos=prompt("¿Cuántos cupos desean reservar?")

if(!cupos)return

let asunto=`${p.origen} - ${p.destino}`

let cuerpo=`

Consulta de cupos aéreos

Ruta: ${p.origen} - ${p.destino}

Fecha: ${p.fecha}

Salida: ${p.salida}
Llegada: ${p.llegada}

Compañía: ${p.compania}

Equipaje: ${p.equipaje}

Tarifa: USD ${p.tarifa}

Cupos solicitados: ${cupos}

`

window.location.href=`mailto:ventas@libertyuruguay.com.uy?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`

}

</script>

</body>

</html>
