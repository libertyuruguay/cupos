<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cupos Aéreos Liberty</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

header{
background:#0B3C8A;
padding:20px;
display:flex;
align-items:center;
gap:20px;
}

header img{
height:50px;
}

header h1{
color:white;
margin:0;
font-size:22px;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
transition:0.25s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 14px 30px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-content{
padding:18px;
}

.route{
font-size:20px;
font-weight:700;
color:#0B3C8A;
}

.airline{
margin-top:8px;
font-size:13px;
}

.details{
font-size:13px;
margin-top:10px;
line-height:1.6;
}

.section{
margin-top:8px;
padding:8px;
background:#f1f3f6;
border-radius:6px;
}

.price{
font-size:26px;
font-weight:700;
color:#0B3C8A;
margin-top:12px;
}

.buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:6px;
font-size:13px;
font-weight:600;
cursor:pointer;
color:white;
}

.mail{background:#1a73e8;}
.whatsapp{background:#25D366;}

</style>

</head>

<body>

<header>

<img src="liberty.png">

<h1>Cupos Aéreos Liberty</h1>

</header>

<div class="container">

<div class="grid" id="resultados"></div>

</div>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

let promos=[]

Papa.parse(csvURL,{

download:true,

complete:function(results){

let rows=results.data.slice(2)

for(let i=0;i<rows.length;i+=2){

let ida=rows[i]
let vuelta=rows[i+1]

if(!ida || !vuelta) continue

promos.push({

origen:ida[0],
destino:ida[1],
compania:ida[2],

fecha_ida:ida[3],
salida_ida:ida[4],
llegada_ida:ida[5],

fecha_vuelta:vuelta[3],
salida_vuelta:vuelta[4],
llegada_vuelta:vuelta[5],

cupos:ida[6],
tarifa:ida[7],
equipaje:ida[8]

})

}

mostrar()

}

})

function mostrar(){

let html=""

promos.forEach(p=>{

html+=`

<div class="card">

<img src="avion-cupos.png">

<div class="card-content">

<div class="route">${p.origen} ✈ ${p.destino}</div>

<div class="airline">
${p.compania}
</div>

<div class="section">

<b>IDA</b><br>
Fecha: ${p.fecha_ida}<br>
Salida: ${p.salida_ida}<br>
Llegada: ${p.llegada_ida}

</div>

<div class="section">

<b>VUELTA</b><br>
Fecha: ${p.fecha_vuelta}<br>
Salida: ${p.salida_vuelta}<br>
Llegada: ${p.llegada_vuelta}

</div>

<div class="details">

Equipaje: ${p.equipaje}<br>
Cupos disponibles: ${p.cupos}

</div>

<div class="price">

USD ${p.tarifa}

</div>

<div class="buttons">

<button class="btn mail" onclick='mail(${JSON.stringify(p)})'>
Consultar
</button>

<button class="btn whatsapp" onclick='whatsapp(${JSON.stringify(p)})'>
WhatsApp
</button>

</div>

</div>

</div>

`

})

document.getElementById("resultados").innerHTML=html

}

function mail(p){

let cupos=prompt("¿Cuántos cupos desean reservar?")

if(!cupos)return

let asunto=`${p.origen} - ${p.destino}`

let cuerpo=`

Consulta cupos aéreos

Ruta: ${p.origen} - ${p.destino}

IDA
Fecha: ${p.fecha_ida}
Salida: ${p.salida_ida}
Llegada: ${p.llegada_ida}

VUELTA
Fecha: ${p.fecha_vuelta}
Salida: ${p.salida_vuelta}
Llegada: ${p.llegada_vuelta}

Equipaje: ${p.equipaje}

Tarifa: USD ${p.tarifa}

Cupos solicitados: ${cupos}

`

window.location.href=`mailto:ventas@libertyuruguay.com.uy?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`

}

function whatsapp(p){

let msg=`Consulta cupos ${p.origen} - ${p.destino}`

window.open(`https://wa.me/598XXXXXXXX?text=${encodeURIComponent(msg)}`)

}

</script>

</body>

</html>
