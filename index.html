<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cupos Aéreos Liberty</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f5fb;
}

.header{
background:#0B3C8A;
color:white;
padding:18px;
display:flex;
align-items:center;
justify-content:center;
gap:15px;
font-size:22px;
font-weight:bold;
}

.logo{
height:45px;
}

.topbar{
max-width:1200px;
margin:auto;
padding:20px;
}

.topbar input{
padding:12px;
border-radius:8px;
border:1px solid #ddd;
width:260px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:130px;
object-fit:cover;
}

.card-body{
padding:12px;
}

.route{
font-weight:600;
font-size:16px;
}

.company{
display:flex;
align-items:center;
gap:6px;
font-size:13px;
color:#666;
margin-top:4px;
}

.airlogo{
height:16px;
width:auto;
}

.price{
font-size:18px;
font-weight:bold;
color:#0B3C8A;
margin-top:6px;
}

.badge{
background:#ff4d4d;
color:white;
font-size:11px;
padding:4px 8px;
border-radius:6px;
display:inline-block;
margin-top:5px;
}

.bar{
height:6px;
background:#eee;
border-radius:4px;
margin-top:6px;
overflow:hidden;
}

.bar div{
height:6px;
background:#ff4d4d;
}

/* MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
border-radius:14px;
max-width:720px;
width:95%;
overflow:hidden;
}

.modal-grid{
display:grid;
grid-template-columns:1fr 1.2fr;
}

.modal-img{
width:100%;
height:100%;
object-fit:cover;
}

.modal-content{
padding:25px;
}

.btn{
padding:12px 16px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
margin-top:12px;
margin-right:10px;
text-decoration:none;
display:inline-block;
}

.mail{background:#1a73e8;}
.whatsapp{background:#25D366;}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

</style>
</head>

<body>

<div class="header">
<img src="liberty.png" class="logo">
<span>Cupos Aéreos Disponibles</span>
</div>

<div class="topbar">
<input id="search" placeholder="Buscar destino, origen o compañía">
</div>

<div class="container" id="lista"></div>

<div class="modal" id="modal">
<div class="modal-box">
<div id="modalContent"></div>
</div>
</div>

<script>

let url="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

let promos=[]

let logos={
"LA":"https://logo.clearbit.com/latam.com",
"G3":"https://logo.clearbit.com/voegol.com.br",
"AR":"https://logo.clearbit.com/aerolineas.com.ar",
"CM":"https://logo.clearbit.com/copaair.com"
}

fetch(url)
.then(r=>r.text())
.then(data=>{

let rows=data.split("\n").slice(1)

rows.forEach(r=>{

let c=r.split(",")

promos.push({
origen:c[0],
destino:c[1],
compania:c[2],
salida:c[3],
regreso:c[4],
disp:c[5],
tarifa:c[6],
equipaje:c[7]
})

})

mostrar()

})

function mostrar(){

let cont=document.getElementById("lista")
cont.innerHTML=""

let filtro=document.getElementById("search").value.toLowerCase()

let lista=promos.filter(p=>

p.destino.toLowerCase().includes(filtro) ||
p.origen.toLowerCase().includes(filtro) ||
p.compania.toLowerCase().includes(filtro)

)

lista.forEach((p,i)=>{

cont.innerHTML+=card(p,i)

})

}

function card(p,i){

let logo=logos[p.compania]||""

let badge=p.disp<=5?`<div class="badge">Últimos ${p.disp}</div>`:""

let bar=Math.min(100,(p.disp/20)*100)

return`

<div class="card" onclick="abrir(${i})">

<img src="avion-cupos.png">

<div class="card-body">

<div class="route">${p.origen} → ${p.destino}</div>

<div class="company">
${logo?`<img class="airlogo" src="${logo}" onerror="this.style.display='none'">`:``}
${p.compania}
</div>

<div class="price">USD ${p.tarifa}</div>

${badge}

<div class="bar">
<div style="width:${bar}%"></div>
</div>

</div>

</div>

`

}

document.getElementById("search").addEventListener("keyup",mostrar)

function abrir(i){

let p=promos[i]

document.getElementById("modalContent").innerHTML=`

<div class="modal-grid">

<img class="modal-img" src="avion-cupos.png">

<div class="modal-content">

<span class="close" onclick="cerrar()">✖</span>

<h2>${p.origen} → ${p.destino}</h2>

<p><b>Compañía:</b> ${p.compania}</p>
<p><b>Salida:</b> ${p.salida}</p>
<p><b>Regreso:</b> ${p.regreso}</p>
<p><b>Cupos:</b> ${p.disp}</p>
<p><b>Equipaje:</b> ${p.equipaje}</p>

<h3 style="color:#0B3C8A">USD ${p.tarifa}</h3>

<button class="btn mail"
onclick="mail('${p.origen}','${p.destino}','${p.compania}','${p.salida}','${p.regreso}','${p.tarifa}','${p.equipaje}')">
Consultar por Mail
</button>

<a class="btn whatsapp"
target="_blank"
href="https://wa.me/598XXXXXXXX?text=Consulta cupo ${p.origen}-${p.destino}">
WhatsApp
</a>

</div>

</div>
`

document.getElementById("modal").style.display="flex"

}

function cerrar(){
document.getElementById("modal").style.display="none"
}

function mail(origen,destino,compania,salida,regreso,tarifa,equipaje){

let asunto=`Consulta Cupo Aéreo ${origen} - ${destino}`

let cuerpo=`
Consulta Cupos Aéreos

Ruta: ${origen} → ${destino}
Compañía: ${compania}
Salida: ${salida}
Regreso: ${regreso}
Equipaje: ${equipaje}
Tarifa: USD ${tarifa}
`

window.location.href=`mailto:TUEMAIL@MAIL.COM?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`

}

</script>

</body>
</html>
