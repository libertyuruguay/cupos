<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cupos Aéreos Liberty</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
margin:0;
}

header{
background:#0b3a6f;
padding:20px;
text-align:center;
}

header img{
height:60px;
}

.container{
max-width:1400px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-body{
padding:18px;
}

.route{
font-size:22px;
font-weight:bold;
color:#0b3a6f;
margin-bottom:12px;
}

.boxes{
display:flex;
gap:10px;
}

.box{
flex:1;
background:#f1f4f9;
padding:12px;
border-radius:8px;
font-size:13px;
}

.info{
margin-top:10px;
font-size:14px;
}

.price{
font-size:22px;
color:#0b3a6f;
font-weight:bold;
margin-top:8px;
}

.buttons{
display:flex;
gap:10px;
margin-top:14px;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-weight:bold;
}

.mail{background:#0b3a6f;}
.wa{background:#25D366;}

</style>
</head>

<body>

<header>
<img src="liberty.png">
</header>

<div class="container">
<div class="grid" id="cards"></div>
</div>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

fetch(csvURL)
.then(r=>r.text())
.then(data=>{

let rows=data.split("\n").slice(2).map(r=>r.split(","))

let container=document.getElementById("cards")

for(let i=0;i<rows.length;){

let escala=(rows[i][0]||"").trim().toUpperCase()

if(escala==="SI" && rows[i+3]){

let r1=rows[i]
let r2=rows[i+1]
let r3=rows[i+2]
let r4=rows[i+3]

let origen=r1[1]
let destino=r2[2]

let ida=`
${r1[3]} ${r1[4]} ${r1[5]}-${r1[6]}<br>
Escala ${r2[1]}<br>
${r2[3]} ${r2[4]} ${r2[5]}-${r2[6]}
`

let regreso=`
${r3[3]} ${r3[4]} ${r3[5]}-${r3[6]}<br>
Escala ${r4[1]}<br>
${r4[3]} ${r4[4]} ${r4[5]}-${r4[6]}
`

let cupos=r4[7]
let tarifa=r4[8]
let equipaje=r4[9]

container.innerHTML+=crearCard(origen,destino,ida,regreso,cupos,tarifa,equipaje)

i+=4

}

else if(rows[i+1]){

let r1=rows[i]
let r2=rows[i+1]

let origen=r1[1]
let destino=r1[2]

let ida=`${r1[3]} ${r1[4]} ${r1[5]}-${r1[6]}`

let regreso=`${r2[3]} ${r2[4]} ${r2[5]}-${r2[6]}`

let cupos=r2[7]
let tarifa=r2[8]
let equipaje=r2[9]

container.innerHTML+=crearCard(origen,destino,ida,regreso,cupos,tarifa,equipaje)

i+=2

}

else{
i++
}

}

})

function crearCard(origen,destino,ida,regreso,cupos,precio,equipaje){

let asunto=`Consulta cupos ${origen} ${destino}`

let cuerpo=`Ruta: ${origen} ${destino}

IDA
${ida}

REGRESO
${regreso}

Equipaje: ${equipaje}

Precio: ${precio}

Cupos disponibles: ${cupos}

Cantidad de cupos que deseo reservar:
`

let mail=`mailto:ventas@liberty.com.uy?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`

let wa=`https://wa.me/59800000000?text=${encodeURIComponent(asunto)}`

return`

<div class="card">

<img src="avion-cupos.png">

<div class="card-body">

<div class="route">${origen} ✈ ${destino}</div>

<div class="boxes">

<div class="box">
<b>IDA</b><br>
${ida}
</div>

<div class="box">
<b>REGRESO</b><br>
${regreso}
</div>

</div>

<div class="info">Equipaje: ${equipaje}</div>
<div class="info">Cupos disponibles: ${cupos}</div>

<div class="price">${precio}</div>

<div class="buttons">

<button class="btn mail" onclick="window.location.href='${mail}'">
Consultar por Mail
</button>

<button class="btn wa" onclick="window.open('${wa}')">
WhatsApp
</button>

</div>

</div>

</div>

`

}

</script>

</body>
</html>
