<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Cupos Liberty</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f4f6fb;
margin:0;
}

/* LOGIN OVERLAY */

.login{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0b3a6f;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.box{
background:white;
padding:35px;
border-radius:14px;
width:320px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.logo{
width:130px;
margin-bottom:10px;
}

h2{
color:#0b3a6f;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:11px;
border:none;
border-radius:7px;
cursor:pointer;
font-weight:600;
}

.loginbtn{
background:#0b3a6f;
color:white;
}

.secbtn{
margin-top:10px;
background:#eef3fb;
color:#0b3a6f;
}

.error{
color:red;
font-size:13px;
display:none;
margin-top:5px;
}

.form{
display:none;
}

/* CONTENIDO OCULTO */

#contenido{
display:none;
}

/* TU DISEÑO ORIGINAL */

header{
background:#0b3a6f;
padding:15px;
}

.headerbox{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
color:white;
font-size:22px;
font-weight:600;
}

header img{
height:50px;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:14px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:all .35s ease;
animation:fadeUp .6s ease;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.plane{
width:100%;
height:100px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px;
}

.route{
font-size:22px;
font-weight:600;
color:#0b3a6f;
text-align:center;
margin-bottom:15px;
}

.flight{
background:#eef3fb;
padding:12px;
border-radius:8px;
margin-bottom:10px;
}

.flighttitle{
font-weight:600;
margin-bottom:6px;
color:#0b3a6f;
}

.flightline{
font-size:14px;
line-height:1.6;
color:#333;
}

.info{
margin-top:6px;
font-size:14px;
}

.price{
font-size:22px;
font-weight:600;
color:#0b3a6f;
margin-top:10px;
}

.mailbtn{
margin-top:12px;
background:#0b3a6f;
color:white;
border:none;
padding:11px;
border-radius:7px;
cursor:pointer;
width:100%;
font-weight:600;
}

.mailbtn:hover{
background:#072a52;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
<div class="box">

<img src="liberty.png" class="logo">
<h2 id="titulo">Iniciar Sesión</h2>

<div id="loginForm">
<input type="text" id="user" placeholder="Usuario">
<input type="password" id="pass" placeholder="Contraseña">

<button class="loginbtn" onclick="login()">Ingresar</button>
<button class="secbtn" onclick="mostrarSolicitud()">Solicitar usuario</button>

<div class="error" id="error">Datos incorrectos</div>
</div>

<div class="form" id="solicitudForm">

<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="apellido" placeholder="Apellido">
<input type="text" id="agencia" placeholder="Agencia">
<input type="text" id="newuser" placeholder="Usuario">
<input type="password" id="newpass" placeholder="Contraseña">

<button class="loginbtn" onclick="enviarSolicitud()">Enviar solicitud</button>
<button class="secbtn" onclick="volverLogin()">Volver</button>

</div>

</div>
</div>

<!-- CONTENIDO -->
<div id="contenido">

<header>
<div class="headerbox">
<img src="liberty.png">
<span>Cupos Aéreos Disponibles</span>
</div>
</header>

<div class="container">
<div class="grid" id="cards"></div>
</div>

</div>

<script>

/* CSV USERS */
const CSV_USERS="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?gid=305598311&single=true&output=csv"

/* CSV CUPOS */
const CSV_CUPOS="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

/* PARSER CSV */
function parseCSV(text){
let rows=[],row=[],cur='',q=false
for(let i=0;i<text.length;i++){
let c=text[i],n=text[i+1]
if(c=='"'&&q&&n=='"'){cur+='"';i++}
else if(c=='"'){q=!q}
else if(c==','&&!q){row.push(cur);cur=''}
else if((c=='\n'||c=='\r')&&!q){
if(cur||row.length){row.push(cur);rows.push(row);row=[];cur=''}
}else{cur+=c}
}
if(cur)row.push(cur)
if(row.length)rows.push(row)
return rows
}

/* LOGIN */
async function login(){

let u=user.value.trim()
let p=pass.value.trim()

let res=await fetch(CSV_USERS)
let data=await res.text()
let rows=parseCSV(data).slice(1)

let ok=false

rows.forEach(c=>{
if(u===c[3] && p===c[4]) ok=true
})

if(ok){
login.style.display="none"
contenido.style.display="block"
cargarCupos()
}else{
error.style.display="block"
}

}

/* UI */
function mostrarSolicitud(){
loginForm.style.display="none"
solicitudForm.style.display="block"
titulo.innerText="Solicitar Usuario"
}

function volverLogin(){
loginForm.style.display="block"
solicitudForm.style.display="none"
titulo.innerText="Iniciar Sesión"
}

/* MAIL */
function enviarSolicitud(){

let asunto="Solicitud usuario Liberty"

let cuerpo=`Solicitud de acceso:

Nombre: ${nombre.value}
Apellido: ${apellido.value}
Agencia: ${agencia.value}
Usuario: ${newuser.value}
Contraseña: ${newpass.value}
`

window.location.href=`mailto:jose@libertyuruguay.com.uy?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`
}

/* CUPOS (tu código original) */
function cargarCupos(){

fetch(CSV_CUPOS)
.then(r=>r.text())
.then(data=>{

let rows=parseCSV(data).slice(2)

for(let i=0;i<rows.length;i+=2){

let ida=rows[i]
let regreso=rows[i+1]
if(!regreso) break

let origen=ida[1]
let destino=ida[2]

let idaLinea=`${origen} → ${destino} | ${ida[3]} | ${ida[4]} | ${ida[5]}-${ida[6]}`
let idaEscala=""
let escalaDestino=destino

if(ida[0]=="SI"){
escalaDestino=ida[8]
idaEscala=`${ida[7]} → ${ida[8]} | ${ida[9]} | ${ida[10]} | ${ida[11]}-${ida[12]}`
}

let regresoLinea=`${regreso[1]} → ${regreso[2]} | ${regreso[3]} | ${regreso[4]} | ${regreso[5]}-${regreso[6]}`
let regresoEscala=""

if(regreso[0]=="SI"){
regresoEscala=`${regreso[7]} → ${regreso[8]} | ${regreso[9]} | ${regreso[10]} | ${regreso[11]}-${regreso[12]}`
}

let cupos=ida[13]
let precio=ida[14]
let equipaje=ida[15]

crearCard(origen,escalaDestino,idaLinea,idaEscala,regresoLinea,regresoEscala,cupos,precio,equipaje)

}

})

}

function crearCard(origen,destino,ida,idaEscala,regreso,regresoEscala,cupos,precio,equipaje){

let asunto=`${origen} - ${destino}`

let cuerpo=`Ruta: ${origen} - ${destino}

IDA
${ida}
${idaEscala}

REGRESO
${regreso}
${regresoEscala}

Equipaje: ${equipaje}
Tarifa: USD ${precio}
Cupos disponibles: ${cupos}
`

let card=`
<div class="card">

<img class="plane" src="avion-cupos.png">

<div class="route">${origen} - ${destino}</div>

<div class="flight">
<div class="flighttitle">✈ IDA</div>
<div class="flightline">${ida}</div>
${idaEscala ? `<div class="flightline">${idaEscala}</div>`:""}
</div>

<div class="flight">
<div class="flighttitle">✈ REGRESO</div>
<div class="flightline">${regreso}</div>
${regresoEscala ? `<div class="flightline">${regresoEscala}</div>`:""}
</div>

<div class="info">Equipaje: ${equipaje}</div>
<div class="info">Cupos disponibles: ${cupos}</div>

<div class="price">USD ${precio}</div>

<button class="mailbtn" onclick="consultar('${asunto}',\`${cuerpo}\`)">
Consultar por Mail
</button>

</div>
`

cards.innerHTML+=card

}

function consultar(asunto,cuerpo){

let cantidad=prompt("¿Cuántos cupos deseas reservar?")
if(!cantidad) return

let mensaje=cuerpo + `\n\nCupos solicitados: ${cantidad}`

window.location.href=`mailto:jose@libertyuruguay.com.uy?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(mensaje)}`
}

</script>

</body>
</html>
