<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cupos Aéreos Liberty</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

header{
background:#0B3C8A;
padding:20px;
display:flex;
align-items:center;
gap:20px;
}

header img{
height:50px;
}

header h1{
color:white;
margin:0;
font-size:22px;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-content{
padding:18px;
}

.title{
font-size:22px;
font-weight:700;
color:#0B3C8A;
margin-bottom:10px;
}

.airline{
font-size:13px;
margin-bottom:12px;
}

.flights{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.box{
background:#f1f3f6;
padding:10px;
border-radius:6px;
font-size:13px;
}

.box b{
color:#0B3C8A;
}

.details{
margin-top:12px;
font-size:13px;
line-height:1.6;
}

.price{
font-size:26px;
font-weight:700;
color:#0B3C8A;
margin-top:10px;
}

.buttons{
display:flex;
gap:10px;
margin-top:15px;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:6px;
font-size:13px;
font-weight:600;
cursor:pointer;
color:white;
}

.mail{background:#1a73e8;}
.whatsapp{background:#25D366;}

</style>

</head>

<body>

<header>

<img src="liberty.png">

<h1>Cupos Aéreos Liberty</h1>

</header>

<div class="container">

<div class="grid" id="resultados"></div>

</div>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

const destinos={

SSA:"Salvador",
CUN:"Cancún",
MIA:"Miami",
GRU:"São Paulo",
PUJ:"Punta Cana",
MAD:"Madrid"

}

let promos=[]

Papa.parse(csvURL,{

download:true,

complete:function(results){

let rows=results.data.slice(2)

for(let i=0;i<rows.length;i+=2){

let ida=rows[i]
let vuelta=rows[i+1]

if(!ida||!vuelta) continue

let destinoNombre=destinos[ida[1]]||ida[1]

promos.push({

destino:destinoNombre,
compania:ida[2],

fecha_ida:ida[3],
salida_ida:ida[4],
llegada_ida:ida[5],

fecha_regreso:vuelta[3],
salida_regreso:vuelta[4],
llegada_regreso:vuelta[5],

equipaje:vuelta[8],
cupos:vuelta[6],
tarifa:vuelta[7]

})

}

mostrar()

}

})

function mostrar(){

let html=""

promos.forEach(p=>{

html+=`

<div class="card">

<img src="avion-cupos.png">

<div class="card-content">

<div class="title">${p.destino}</div>

<div class="airline">${p.compania}</div>

<div class="flights">

<div class="box">

<b>IDA</b><br>

Fecha: ${p.fecha_ida}<br>
Salida: ${p.salida_ida}<br>
Llegada: ${p.llegada_ida}

</div>

<div class="box">

<b>REGRESO</b><br>

Fecha: ${p.fecha_regreso}<br>
Salida: ${p.salida_regreso}<br>
Llegada: ${p.llegada_regreso}

</div>

</div>

<div class="details">

Equipaje: ${p.equipaje}<br>
Cupos disponibles: ${p.cupos}

</div>

<div class="price">

USD ${p.tarifa}

</div>

<div class="buttons">

<button class="btn mail" onclick='mail(${JSON.stringify(p)})'>
Consultar
</button>

<button class="btn whatsapp" onclick='whatsapp(${JSON.stringify(p)})'>
WhatsApp
</button>

</div>

</div>

</div>

`

})

document.getElementById("resultados").innerHTML=html

}

function mail(p){

let cupos=prompt("¿Cuántos cupos desean reservar?")

if(!cupos)return

let asunto=p.destino

let cuerpo=`

Consulta cupos aéreos

Destino: ${p.destino}

IDA
Fecha: ${p.fecha_ida}
Salida: ${p.salida_ida}
Llegada: ${p.llegada_ida}

REGRESO
Fecha: ${p.fecha_regreso}
Salida: ${p.salida_regreso}
Llegada: ${p.llegada_regreso}

Equipaje: ${p.equipaje}

Tarifa: USD ${p.tarifa}

Cupos solicitados: ${cupos}

`

window.location.href=`mailto:ventas@libertyuruguay.com.uy?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`

}

function whatsapp(p){

let msg=`Consulta cupos ${p.destino}`

window.open(`https://wa.me/598XXXXXXXX?text=${encodeURIComponent(msg)}`)

}

</script>

</body>

</html>
