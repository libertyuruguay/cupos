<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cupos Aéreos Liberty</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f5fb;
}

.header{
background:#0B3C8A;
color:white;
padding:18px;
display:flex;
align-items:center;
justify-content:center;
gap:15px;
font-size:22px;
font-weight:bold;
}

.logo{
height:45px;
}

.topbar{
max-width:1200px;
margin:auto;
padding:20px;
}

.topbar input{
padding:12px;
border-radius:8px;
border:1px solid #ddd;
width:260px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.route{
font-weight:600;
font-size:16px;
margin-bottom:5px;
}

.company{
display:flex;
align-items:center;
gap:6px;
font-size:13px;
color:#555;
}

.airlogo{
height:16px;
}

.info{
font-size:13px;
margin-top:6px;
}

.price{
font-size:20px;
font-weight:bold;
color:#0B3C8A;
margin-top:10px;
}

.badge{
background:#ff4d4d;
color:white;
font-size:11px;
padding:4px 8px;
border-radius:6px;
display:inline-block;
margin-top:6px;
}

.buttons{
margin-top:12px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-size:13px;
text-align:center;
text-decoration:none;
}

.mail{
background:#1a73e8;
}

.whatsapp{
background:#25D366;
}

</style>
</head>

<body>

<div class="header">
<img src="liberty.png" class="logo">
<span>Cupos Aéreos Disponibles</span>
</div>

<div class="topbar">
<input id="search" placeholder="Buscar destino, origen o compañía">
</div>

<div class="container" id="lista"></div>

<script>

let url="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

let promos=[]

let logos={
"LA":"https://logo.clearbit.com/latam.com",
"G3":"https://logo.clearbit.com/voegol.com.br",
"AR":"https://logo.clearbit.com/aerolineas.com.ar",
"CM":"https://logo.clearbit.com/copaair.com"
}

fetch(url)
.then(r=>r.text())
.then(data=>{

let rows=data.split("\n").slice(1)

rows.forEach(r=>{

let c=r.split(",")

let promo={
origen:c[0],
destino:c[1],
compania:c[2],
salida:c[3],
regreso:c[4],
disp:c[5],
tarifa:c[6],
equipaje:c[7]
}

promos.push(promo)

})

mostrar()

})

function mostrar(){

let cont=document.getElementById("lista")
cont.innerHTML=""

let filtro=document.getElementById("search").value.toLowerCase()

let lista=promos.filter(p=>

p.destino.toLowerCase().includes(filtro) ||
p.origen.toLowerCase().includes(filtro) ||
p.compania.toLowerCase().includes(filtro)

)

lista.forEach(p=>{

cont.innerHTML+=card(p)

})

}

function card(p){

let logo=logos[p.compania]||""

let badge=p.disp<=5?`<div class="badge">Últimos ${p.disp}</div>`:""

return`

<div class="card">

<img src="avion-cupos.png">

<div class="card-body">

<div class="route">${p.origen} → ${p.destino}</div>

<div class="company">
${logo?`<img class="airlogo" src="${logo}" onerror="this.style.display='none'">`:``}
${p.compania}
</div>

<div class="info"><b>Salida:</b> ${p.salida}</div>
<div class="info"><b>Regreso:</b> ${p.regreso}</div>
<div class="info"><b>Equipaje:</b> ${p.equipaje}</div>
<div class="info"><b>Cupos disponibles:</b> ${p.disp}</div>

<div class="price">USD ${p.tarifa}</div>

${badge}

<div class="buttons">

<button class="btn mail" onclick='mail(${JSON.stringify(p)})'>
Consultar Mail
</button>

<a class="btn whatsapp"
target="_blank"
href="https://wa.me/59893488519?text=Consulta%20cupo%20${p.origen}%20-%20${p.destino}">
WhatsApp
</a>

</div>

</div>

</div>

`

}

document.getElementById("search").addEventListener("keyup",mostrar)

function mail(p){

let cupos=prompt("¿Cuántos cupos desean reservar?")

if(!cupos) return

let asunto=`${p.origen} - ${p.destino}`

let cuerpo=
`Solicitud de Cupos Aéreos

Ruta: ${p.origen} → ${p.destino}
Compañía: ${p.compania}
Salida: ${p.salida}
Regreso: ${p.regreso}
Equipaje: ${p.equipaje}
Tarifa: USD ${p.tarifa}

Cupos solicitados: ${cupos}

Disponibilidad informada: ${p.disp}
`

window.location.href=`mailto:reservas@libertyuruguay.com.uy?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`

}

</script>

</body>
</html>
