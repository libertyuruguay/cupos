<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cupos Aéreos Liberty</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

header{
background:#0b3a6f;
padding:20px;
text-align:center;
}

header img{
height:60px;
}

.container{
max-width:1400px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card-body{
padding:18px;
}

.route{
font-size:22px;
font-weight:bold;
color:#0b3a6f;
margin-bottom:10px;
}

.boxes{
display:flex;
gap:10px;
margin-bottom:12px;
}

.box{
flex:1;
background:#f1f4f9;
padding:10px;
border-radius:8px;
font-size:13px;
}

.info{
font-size:14px;
margin-top:8px;
}

.price{
font-size:22px;
color:#0b3a6f;
font-weight:bold;
margin-top:10px;
}

.buttons{
display:flex;
gap:10px;
margin-top:12px;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-weight:bold;
}

.mail{background:#0b3a6f;}
.wa{background:#25D366;}

</style>
</head>

<body>

<header>
<img src="liberty.png">
</header>

<div class="container">

<div class="grid" id="cards"></div>

</div>

<script>

const CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

fetch(CSV)
.then(r=>r.text())
.then(text=>{

let rows=text.split("\n").slice(2).map(r=>r.split(","))

let container=document.getElementById("cards")

for(let i=0;i<rows.length;){

let escala=rows[i][0]

if(escala=="SI"){

let r1=rows[i]
let r2=rows[i+1]
let r3=rows[i+2]
let r4=rows[i+3]

let origen=r1[1]
let destino=r2[2]

let html=createCard(

origen,
destino,

`
${r1[3]} ${r1[4]} ${r1[5]}-${r1[6]}<br>
Escala ${r2[1]}<br>
${r2[3]} ${r2[4]} ${r2[5]}-${r2[6]}
`,

`
${r3[3]} ${r3[4]} ${r3[5]}-${r3[6]}<br>
Escala ${r4[1]}<br>
${r4[3]} ${r4[4]} ${r4[5]}-${r4[6]}
`,

r4[9],
r4[7],
r4[8]

)

container.innerHTML+=html

i+=4

}

else{

let r1=rows[i]
let r2=rows[i+1]

let origen=r1[1]
let destino=r1[2]

let html=createCard(

origen,
destino,

`${r1[3]} ${r1[4]} ${r1[5]}-${r1[6]}`,

`${r2[3]} ${r2[4]} ${r2[5]}-${r2[6]}`,

r2[9],
r2[7],
r2[8]

)

container.innerHTML+=html

i+=2

}

}

})

function createCard(origen,destino,ida,regreso,equipaje,cupos,precio){

let asunto=`Consulta cupos ${origen} ${destino}`

let body=`
Ruta: ${origen} ${destino}

IDA
${ida}

REGRESO
${regreso}

Equipaje: ${equipaje}

Precio: ${precio}

Cupos disponibles: ${cupos}

Cantidad de cupos solicitados:
`

let mail=`mailto:ventas@liberty.com.uy?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(body)}`

let wa=`https://wa.me/59800000000?text=${encodeURIComponent(asunto)}`

return`

<div class="card">

<img src="avion-cupos.png">

<div class="card-body">

<div class="route">${origen} ✈ ${destino}</div>

<div class="boxes">

<div class="box">
<b>IDA</b><br>
${ida}
</div>

<div class="box">
<b>REGRESO</b><br>
${regreso}
</div>

</div>

<div class="info">Equipaje: ${equipaje}</div>
<div class="info">Cupos: ${cupos}</div>

<div class="price">${precio}</div>

<div class="buttons">
<button class="btn mail" onclick="window.location.href='${mail}'">Consultar Mail</button>
<button class="btn wa" onclick="window.open('${wa}')">WhatsApp</button>
</div>

</div>

</div>

`

}

</script>

</body>
</html>
