<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Cupos Liberty</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

header{
background:#0b3a6f;
padding:15px;
text-align:center;
}

header img{
height:55px;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
animation:fadeUp .6s ease;
position:relative;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.plane{
position:absolute;
top:-18px;
left:50%;
transform:translateX(-50%);
width:60px;
}

.route{
font-size:22px;
font-weight:bold;
color:#0b3a6f;
margin-top:15px;
margin-bottom:15px;
text-align:center;
}

.flight{
background:#f1f4f9;
padding:12px;
border-radius:8px;
margin-bottom:10px;
font-size:14px;
}

.info{
margin-top:6px;
font-size:14px;
}

.price{
font-size:24px;
font-weight:bold;
color:#0b3a6f;
margin-top:10px;
}

.mailbtn{
margin-top:12px;
background:#0b3a6f;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
width:100%;
font-weight:bold;
}

.mailbtn:hover{
background:#072a52;
}

</style>

</head>

<body>

<header>
<img src="liberty.png">
</header>

<div class="container">
<div class="grid" id="cards"></div>
</div>

<script>

const CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

fetch(CSV)
.then(r=>r.text())
.then(data=>{

let rows=data.split("\n").slice(2).map(r=>r.split(","))

for(let i=0;i<rows.length;i+=2){

let ida=rows[i]
let regreso=rows[i+1]

if(!regreso) break

let escala=ida[0]

let origen=ida[1]
let destino=ida[2]

let idaInfo=`${ida[3]} ${ida[4]} ${ida[5]}-${ida[6]}`

let escalaInfo=""

let escalaDestino=destino

if(escala=="SI"){

escalaDestino=ida[8]

escalaInfo=`
<br><b>Escala</b><br>
${ida[7]} → ${ida[8]}<br>
${ida[9]} ${ida[10]} ${ida[11]}-${ida[12]}
`
}

let regresoInfo=`${regreso[3]} ${regreso[4]} ${regreso[5]}-${regreso[6]}`

let cupos=ida[13]
let precio=ida[14]
let equipaje=ida[15]

crearCard(origen,destino,escalaDestino,idaInfo,escalaInfo,regresoInfo,cupos,precio,equipaje)

}

})

function crearCard(origen,destino,escalaDestino,ida,escala,regreso,cupos,precio,equipaje){

let asunto=`${origen} - ${escalaDestino}`

let cuerpo=`Ruta: ${origen} - ${escalaDestino}

IDA
${ida}

${escala}

REGRESO
${regreso}

Equipaje: ${equipaje}
Tarifa: USD ${precio}
Cupos disponibles: ${cupos}
`

let card=`

<div class="card">

<img class="plane" src="avion-cupos.png">

<div class="route">${origen} ✈ ${destino}</div>

<div class="flight">
<b>IDA</b><br>
${ida}
${escala}
</div>

<div class="flight">
<b>REGRESO</b><br>
${regreso}
</div>

<div class="info">Equipaje: ${equipaje}</div>
<div class="info">Cupos disponibles: ${cupos}</div>

<div class="price">USD ${precio}</div>

<button class="mailbtn" onclick="consultar('${asunto}','${cuerpo}')">
Consultar por Mail
</button>

</div>
`

document.getElementById("cards").innerHTML+=card

}

function consultar(asunto,cuerpo){

let cantidad=prompt("¿Cuántos cupos deseas reservar?")

if(!cantidad) return

let mensaje=cuerpo + `

Cupos solicitados: ${cantidad}
`

let mail=`mailto:ventas@liberty.com.uy?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(mensaje)}`

window.location.href=mail

}

</script>

</body>
</html>
