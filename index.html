<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Cupos Aéreos Liberty</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

header{
background:#0b3a6f;
padding:18px;
text-align:center;
}

header img{
height:55px;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.route{
font-size:22px;
font-weight:bold;
color:#0b3a6f;
margin-bottom:15px;
}

.flight{
background:#f1f4f9;
padding:12px;
border-radius:8px;
margin-bottom:10px;
font-size:14px;
}

.info{
margin-top:8px;
font-size:14px;
}

.price{
font-size:24px;
font-weight:bold;
color:#0b3a6f;
margin-top:10px;
}

.buttons{
display:flex;
gap:10px;
margin-top:12px;
}

.btn{
flex:1;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-weight:bold;
}

.mail{background:#0b3a6f;}
.wa{background:#25D366;}

</style>

</head>

<body>

<header>
<img src="liberty.png">
</header>

<div class="container">
<div class="grid" id="cards"></div>
</div>

<script>

const CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

fetch(CSV)
.then(r=>r.text())
.then(data=>{

let rows=data.split("\n").slice(1).map(r=>r.split(","))

rows.forEach(row=>{

let origen=row[1]
let destino=row[2]

let compania=row[3]
let fecha=row[4]
let salida=row[5]
let llegada=row[6]

let escalaOrigen=row[7]
let escalaDestino=row[8]

let companiaReg=row[9]
let fechaReg=row[10]
let salidaReg=row[11]
let llegadaReg=row[12]

let cupos=row[13]
let precio=row[14]
let equipaje=row[15]

let ida=`${compania} ${fecha} ${salida} - ${llegada}`

if(escalaOrigen && escalaDestino){
ida+=`<br>Escala ${escalaOrigen} → ${escalaDestino}`
}

let regreso=`${companiaReg} ${fechaReg} ${salidaReg} - ${llegadaReg}`

crearCard(origen,destino,ida,regreso,cupos,precio,equipaje)

})

})

function crearCard(origen,destino,ida,regreso,cupos,precio,equipaje){

let asunto=`Consulta cupos ${origen} ${destino}`

let mail=`mailto:ventas@liberty.com.uy?subject=${encodeURIComponent(asunto)}`

let wa=`https://wa.me/59800000000?text=${encodeURIComponent(asunto)}`

let card=`

<div class="card">

<div class="route">${origen} ✈ ${destino}</div>

<div class="flight">
<b>IDA</b><br>
${ida}
</div>

<div class="flight">
<b>REGRESO</b><br>
${regreso}
</div>

<div class="info">Equipaje: ${equipaje}</div>
<div class="info">Cupos disponibles: ${cupos}</div>

<div class="price">USD ${precio}</div>

<div class="buttons">

<button class="btn mail" onclick="window.location.href='${mail}'">
Consultar Mail
</button>

<button class="btn wa" onclick="window.open('${wa}')">
WhatsApp
</button>

</div>

</div>
`

document.getElementById("cards").innerHTML+=card

}

</script>

</body>

</html>
