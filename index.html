<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Cupos Liberty</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f4f6fb;
margin:0;
}

header{
background:#0b3a6f;
padding:15px;
}

.headerbox{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
color:white;
font-size:22px;
font-weight:600;
}

header img{
height:50px;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

/* CARD estilo Copa */
.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
margin-bottom:20px;
display:flex;
justify-content:space-between;
align-items:center;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 15px 35px rgba(0,0,0,0.12);
}

.left{
flex:1;
}

.route{
font-weight:600;
color:#0b3a6f;
margin-bottom:8px;
}

.time{
font-size:20px;
font-weight:600;
}

.sub{
font-size:13px;
color:#666;
}

.right{
text-align:right;
min-width:180px;
}

.price{
font-size:26px;
font-weight:700;
color:#0b3a6f;
}

.btn{
margin-top:8px;
background:#0b3a6f;
color:white;
border:none;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
font-weight:600;
}

.btn:hover{
background:#072a52;
}

.details{
color:#0b3a6f;
font-size:13px;
cursor:pointer;
margin-top:6px;
display:inline-block;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:white;
border-radius:12px;
padding:25px;
width:500px;
max-width:90%;
}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

.timeline{
margin-top:20px;
border-left:2px solid #ddd;
padding-left:15px;
}

.stop{
margin-bottom:20px;
}

.stop b{
display:block;
color:#0b3a6f;
}

</style>
</head>

<body>

<header>
<div class="headerbox">
<img src="liberty.png">
<span>Cupos Aéreos Disponibles</span>
</div>
</header>

<div class="container" id="cards"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="cerrarModal()">✖</span>
<h3>Detalles de Vuelo</h3>

<div class="timeline" id="detalleContenido"></div>

</div>
</div>

<script>

const CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

fetch(CSV)
.then(r=>r.text())
.then(data=>{

let rows=data.split("\n").slice(2).map(r=>r.split(","))

for(let i=0;i<rows.length;i+=2){

let ida=rows[i]
let regreso=rows[i+1]
if(!regreso) break

crearCard(ida, regreso)

}

})

function crearCard(ida, regreso){

let origen=ida[1]
let destino=ida[2]

let salida=ida[5]
let llegada=ida[6]

let duracion="Duración estimada"

let precio=ida[14]

let detalleHTML=generarDetalle(ida, regreso)

let card=`
<div class="card">

<div class="left">
<div class="route">${origen} → ${destino}</div>
<div class="time">${salida} - ${llegada}</div>
<div class="sub">Operado por ${ida[3]}</div>
<div class="details" onclick='abrirModal(\`${detalleHTML}\`)'>Ver detalles</div>
</div>

<div class="right">
<div class="price">USD ${precio}</div>
<button class="btn" onclick="consultar('${origen}-${destino}')">Consultar</button>
</div>

</div>
`

document.getElementById("cards").innerHTML+=card

}

function generarDetalle(ida, regreso){

let html=`

<div class="stop">
<b>${ida[5]} - ${ida[1]}</b>
Vuelo ${ida[3]}
</div>

<div class="stop">
<b>${ida[6]} - ${ida[2]}</b>
</div>

<div class="stop">
<b>${regreso[5]} - ${regreso[1]}</b>
Vuelo ${regreso[3]}
</div>

<div class="stop">
<b>${regreso[6]} - ${regreso[2]}</b>
</div>

`

return html

}

function abrirModal(contenido){
document.getElementById("modal").style.display="flex"
document.getElementById("detalleContenido").innerHTML=contenido
}

function cerrarModal(){
document.getElementById("modal").style.display="none"
}

function consultar(ruta){

let cantidad=prompt("¿Cuántos cupos deseas?")

if(!cantidad) return

let mail=`mailto:jose@libertyuruguay.com.uy?subject=${ruta}&body=Cupos solicitados: ${cantidad}`

window.location.href=mail

}

</script>

</body>
</html>
