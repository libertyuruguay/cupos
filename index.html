<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Cupos Aéreos Liberty</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#f4f7fb;
}

header{
background:linear-gradient(135deg,#0B3C8A,#1A73E8);
color:white;
text-align:center;
padding:60px 20px;
}

header h1{
margin:0;
font-size:36px;
}

.search{
background:white;
max-width:1000px;
margin:auto;
margin-top:-40px;
padding:25px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.search input{
padding:14px;
border-radius:8px;
border:1px solid #ddd;
width:200px;
}

.search button{
background:#1A73E8;
color:white;
border:none;
padding:14px 25px;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

.results{
max-width:1000px;
margin:40px auto;
}

.card{
background:white;
border-radius:12px;
padding:20px;
margin-bottom:20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.route{
font-size:20px;
font-weight:600;
}

.company{
color:#777;
}

.flight{
margin-top:10px;
}

.disp{
color:green;
font-weight:600;
}

.price{
font-size:26px;
font-weight:600;
color:#0B3C8A;
}

.btn{
background:#1A73E8;
color:white;
padding:10px 20px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-top:10px;
}

</style>

</head>

<body>

<header>

<h1>✈️ Cupos Aéreos Liberty</h1>
<p>Consulta disponibilidad para agencias</p>

</header>

<div class="search">

<input id="origen" placeholder="Origen">
<input id="destino" placeholder="Destino">

<button onclick="buscar()">Buscar</button>

</div>

<div class="results" id="resultados"></div>

<script>

const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv";

let vuelos=[];

fetch(url)
.then(res=>res.text())
.then(data=>{

let filas=data.split("\n").slice(1);

filas.forEach(f=>{

let c=f.split(",");

vuelos.push({

origen:c[0],
destino:c[1],
compania:c[2],
salida:c[3],
regreso:c[4],
disponibilidad:c[5],
tarifa:c[6],
equipaje:c[7]

});

});

mostrar(vuelos);

});

function buscar(){

let origen=document.getElementById("origen").value.toLowerCase();
let destino=document.getElementById("destino").value.toLowerCase();

let filtrado=vuelos.filter(v=>

(!origen || v.origen.toLowerCase().includes(origen)) &&
(!destino || v.destino.toLowerCase().includes(destino))

);

mostrar(filtrado);

}

function mostrar(lista){

let html="";

lista.forEach(v=>{

html+=`

<div class="card">

<div>

<div class="route">${v.origen} → ${v.destino}</div>

<div class="company">${v.compania}</div>

<div class="flight">

🛫 Salida: ${v.salida}<br>
🛬 Regreso: ${v.regreso}

</div>

<div class="disp">

Disponibilidad: ${v.disponibilidad}

</div>

<div>

🧳 Equipaje: ${v.equipaje}

</div>

</div>

<div>

<div class="price">

USD ${v.tarifa}

</div>

<a class="btn" href="mailto:ventas@libertyuruguay.com.uy?subject=Cupo ${v.origen}-${v.destino}">

Consultar

</a>

</div>

</div>

`;

});

document.getElementById("resultados").innerHTML=html;

}

</script>

</body>
</html>
