<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Cupos Liberty</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#f4f6fb;
margin:0;
}

header{
background:#0b3a6f;
padding:15px;
}

.headerbox{
display:flex;
align-items:center;
justify-content:center;
gap:15px;
color:white;
font-size:22px;
font-weight:600;
}

header img{
height:50px;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(520px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:14px;
padding:18px 20px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
transition:0.25s;
display:flex;
align-items:center;
justify-content:space-between;
gap:15px;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 14px 30px rgba(0,0,0,0.15);
}

.left{
display:flex;
gap:15px;
align-items:center;
flex:1;
}

.airline{
width:45px;
}

.route{
font-size:20px;
font-weight:600;
color:#0b3a6f;
}

.flightline{
font-size:14px;
color:#333;
margin-top:2px;
}

.info{
font-size:13px;
color:#666;
margin-top:3px;
}

.right{
text-align:right;
display:flex;
flex-direction:column;
align-items:flex-end;
gap:8px;
}

.price{
font-size:24px;
font-weight:600;
color:#0b3a6f;
}

.mailbtn{
background:#0b3a6f;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
font-weight:600;
font-size:13px;
}

.mailbtn:hover{
background:#072a52;
}

</style>
</head>

<body>

<header>
<div class="headerbox">
<img src="liberty.png">
<span>Cupos Aéreos Disponibles</span>
</div>
</header>

<div class="container">
<div class="grid" id="cards"></div>
</div>

<script>

const CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

fetch(CSV)
.then(r=>r.text())
.then(data=>{

let rows=data.split("\n").slice(2).map(r=>r.split(","))

for(let i=0;i<rows.length;i+=2){

let ida=rows[i]
let regreso=rows[i+1]

if(!regreso) break

let origen=ida[1]
let destino=ida[2]

let idaLinea=`${origen} → ${destino} | ${ida[3]} | ${ida[4]} | ${ida[5]}-${ida[6]}`

let idaEscala=""
let escalaDestino=destino

if(ida[0]=="SI"){

escalaDestino=ida[8]

idaEscala=`${ida[7]} → ${ida[8]} | ${ida[9]} | ${ida[10]} | ${ida[11]}-${ida[12]}`

}

let regresoLinea=`${regreso[1]} → ${regreso[2]} | ${regreso[3]} | ${regreso[4]} | ${regreso[5]}-${regreso[6]}`

let regresoEscala=""

if(regreso[0]=="SI"){

regresoEscala=`${regreso[7]} → ${regreso[8]} | ${regreso[9]} | ${regreso[10]} | ${regreso[11]}-${regreso[12]}`

}

let cupos=ida[13]
let precio=ida[14]
let equipaje=ida[15]

crearCard(origen,escalaDestino,idaLinea,idaEscala,regresoLinea,regresoEscala,cupos,precio,equipaje)

}

})

function crearCard(origen,destino,ida,idaEscala,regreso,regresoEscala,cupos,precio,equipaje){

let asunto=`${origen} - ${destino}`

let cuerpo=`Ruta: ${origen} - ${destino}

IDA
${ida}
${idaEscala}

REGRESO
${regreso}
${regresoEscala}

Equipaje: ${equipaje}
Tarifa: USD ${precio}
Cupos disponibles: ${cupos}
`

let card=`

<div class="card">

<div class="left">

<img class="airline" src="avion-cupos.png">

<div>

<div class="route">${origen} - ${destino}</div>

<div class="flightline">IDA: ${ida}</div>
${idaEscala ? `<div class="flightline">${idaEscala}</div>`:""}

<div class="flightline">REGRESO: ${regreso}</div>
${regresoEscala ? `<div class="flightline">${regresoEscala}</div>`:""}

<div class="info">Equipaje: ${equipaje} | Cupos: ${cupos}</div>

</div>

</div>

<div class="right">

<div class="price">USD ${precio}</div>

<button class="mailbtn" onclick="consultar('${asunto}',\`${cuerpo}\`)">
Consultar
</button>

</div>

</div>
`

document.getElementById("cards").innerHTML+=card

}

function consultar(asunto,cuerpo){

let cantidad=prompt("¿Cuántos cupos deseas reservar?")

if(!cantidad) return

let mensaje=cuerpo + `

Cupos solicitados: ${cantidad}
`

let mail=`mailto:jose@libertyuruguay.com.uy?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(mensaje)}`

window.location.href=mail

}

</script>

</body>
</html>
