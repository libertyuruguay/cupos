<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Promociones Aéreas Liberty</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#f2f5f9;
color:#333;
}

header{
background:linear-gradient(120deg,#0B3C8A,#1A73E8);
color:white;
text-align:center;
padding:60px 20px;
}

header h1{
margin:0;
font-size:38px;
}

.container{
max-width:1300px;
margin:auto;
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:190px;
object-fit:cover;
}

.card-body{
padding:18px;
}

.rating{
background:#1A73E8;
color:white;
display:inline-block;
padding:4px 10px;
border-radius:8px;
font-size:12px;
}

.route{
font-size:20px;
font-weight:600;
margin-top:8px;
}

.company{
color:#777;
font-size:14px;
}

.price{
font-size:24px;
font-weight:700;
color:#0B3C8A;
margin-top:10px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
border-radius:14px;
padding:30px;
max-width:520px;
width:90%;
animation:fade .3s;
}

@keyframes fade{
from{transform:scale(.9);opacity:0}
to{transform:scale(1);opacity:1}
}

.close{
float:right;
font-size:20px;
cursor:pointer;
}

.btn{
display:inline-block;
padding:12px 20px;
border-radius:8px;
text-decoration:none;
margin-top:15px;
color:white;
font-weight:500;
}

.mail{
background:#1A73E8;
}

.whatsapp{
background:#25D366;
margin-left:10px;
}

</style>

</head>

<body>

<header>

<h1>✈️ Promociones Aéreas Liberty</h1>
<p>Cupos exclusivos para agencias</p>

</header>

<div class="container" id="cards"></div>

<div class="modal" id="modal">

<div class="modal-box">

<span class="close" onclick="closeModal()">✖</span>

<div id="modalContent"></div>

</div>

</div>

<script>

const sheet="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv";

let promos=[];

fetch(sheet)
.then(r=>r.text())
.then(data=>{

let filas=data.split("\n").slice(1);

filas.forEach(f=>{

let c=f.split(",");

promos.push({
origen:c[0],
destino:c[1],
compania:c[2],
salida:c[3],
regreso:c[4],
disp:c[5],
tarifa:c[6],
equipaje:c[7],
imagen:"https://source.unsplash.com/600x400/?"+c[1]+",city"
});

});

render();

});

function render(){

let html="";

promos.forEach((p,i)=>{

html+=`

<div class="card" onclick="openPromo(${i})">

<img src="${p.imagen}">

<div class="card-body">

<span class="rating">Promo</span>

<div class="route">${p.origen} → ${p.destino}</div>

<div class="company">${p.compania}</div>

<div class="price">USD ${p.tarifa}</div>

</div>

</div>

`;

});

document.getElementById("cards").innerHTML=html;

}

function openPromo(i){

let p=promos[i];

let texto=`

<h2>${p.origen} → ${p.destino}</h2>

<p><b>Compañía:</b> ${p.compania}</p>
<p><b>Salida:</b> ${p.salida}</p>
<p><b>Regreso:</b> ${p.regreso}</p>
<p><b>Disponibilidad:</b> ${p.disp}</p>
<p><b>Equipaje:</b> ${p.equipaje}</p>
<p><b>Tarifa:</b> USD ${p.tarifa}</p>

<a class="btn mail" href="mailto:TUEMAIL@MAIL.COM?subject=Consulta ${p.origen}-${p.destino}">
Consultar por Mail
</a>

<a class="btn whatsapp" href="https://wa.me/TUNUMERO?text=Hola quiero consultar la promo ${p.origen}-${p.destino}">
WhatsApp
</a>

`;

document.getElementById("modalContent").innerHTML=texto;

document.getElementById("modal").style.display="flex";

}

function closeModal(){

document.getElementById("modal").style.display="none";

}

</script>

</body>
</html>
