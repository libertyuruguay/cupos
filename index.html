<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cupos Aéreos</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f5fb;
}

header{
background:#0B3C8A;
color:white;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.topbar{
max-width:1200px;
margin:auto;
padding:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.topbar input{
flex:1;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
}

.topbar select{
padding:12px;
border-radius:8px;
border:1px solid #ddd;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:130px;
object-fit:cover;
}

.card-body{
padding:12px;
}

.route{
font-weight:600;
font-size:16px;
}

.company{
display:flex;
align-items:center;
gap:6px;
font-size:13px;
color:#666;
margin-top:3px;
}

.company img{
height:16px;
}

.price{
font-size:18px;
font-weight:bold;
color:#0B3C8A;
margin-top:5px;
}

.badge{
display:inline-block;
background:#ff4d4d;
color:white;
font-size:11px;
padding:4px 8px;
border-radius:6px;
margin-top:5px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
border-radius:14px;
max-width:700px;
width:95%;
overflow:hidden;
}

.modal-grid{
display:grid;
grid-template-columns:1fr 1.2fr;
}

.modal-img{
width:100%;
height:100%;
object-fit:cover;
}

.modal-content{
padding:25px;
}

.modal-content h2{
margin-top:0;
}

.modal-content p{
margin:6px 0;
}

.input-cupos{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

.btn{
padding:12px 16px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
margin-top:15px;
}

.mail{
background:#1a73e8;
}

.whatsapp{
background:#25D366;
}

.close{
float:right;
cursor:pointer;
font-size:20px;
}

</style>
</head>

<body>

<header>
Cupos Aéreos Disponibles
</header>

<div class="topbar">

<input id="search" placeholder="Buscar destino, origen o compañía">

<select id="orden">
<option value="">Ordenar</option>
<option value="menor">Precio menor</option>
<option value="mayor">Precio mayor</option>
</select>

</div>

<div class="container" id="lista"></div>

<div class="modal" id="modal">
<div class="modal-box">
<div id="modalContent"></div>
</div>
</div>

<script>

let url="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1RniGt74piEAVb7oVGRQ5NQ-cH_8_gY5V0ZTKWIegH0Osb1SQ_la4lW5nT3E7g2wnjjcHYGSYuQnt/pub?output=csv"

let promos=[]

let logos={
"LA":"https://upload.wikimedia.org/wikipedia/commons/5/5b/LATAM_Airlines_logo.svg",
"G3":"https://upload.wikimedia.org/wikipedia/commons/6/6b/Gol_Transportes_A%C3%A9reos_logo.svg",
"AR":"https://upload.wikimedia.org/wikipedia/commons/7/73/Aerol%C3%ADneas_Argentinas_logo.svg",
"CM":"https://upload.wikimedia.org/wikipedia/commons/6/6f/Copa_Airlines_logo.svg"
}

fetch(url)
.then(r=>r.text())
.then(data=>{

let rows=data.split("\n").slice(1)

rows.forEach(r=>{

let c=r.split(",")

promos.push({

origen:c[0],
destino:c[1],
compania:c[2],
salida:c[3],
regreso:c[4],
disp:c[5],
tarifa:parseInt(c[6]),
equipaje:c[7]

})

})

mostrar()

})

function mostrar(){

let cont=document.getElementById("lista")
cont.innerHTML=""

let filtro=document.getElementById("search").value.toLowerCase()
let orden=document.getElementById("orden").value

let lista=[...promos]

lista=lista.filter(p=>

p.destino.toLowerCase().includes(filtro) ||
p.origen.toLowerCase().includes(filtro) ||
p.compania.toLowerCase().includes(filtro)

)

if(orden=="menor") lista.sort((a,b)=>a.tarifa-b.tarifa)
if(orden=="mayor") lista.sort((a,b)=>b.tarifa-a.tarifa)

lista.forEach((p,i)=>{

let badge=p.disp<=5?`<div class="badge">Últimos ${p.disp}</div>`:""

let logo=logos[p.compania]||""

cont.innerHTML+=`

<div class="card" onclick="abrir(${i})">

<img src="avion-cupos.png">

<div class="card-body">

<div class="route">${p.origen} → ${p.destino}</div>

<div class="company">
<img src="${logo}"> ${p.compania}
</div>

<div class="price">USD ${p.tarifa}</div>

${badge}

</div>

</div>

`

})

}

document.getElementById("search").addEventListener("keyup",mostrar)
document.getElementById("orden").addEventListener("change",mostrar)

function abrir(i){

let p=promos[i]

document.getElementById("modalContent").innerHTML=`

<div class="modal-grid">

<img class="modal-img" src="avion-cupos.png">

<div class="modal-content">

<span class="close" onclick="cerrar()">✖</span>

<h2>${p.origen} → ${p.destino}</h2>

<p>✈️ <b>Compañía:</b> ${p.compania}</p>
<p>🛫 <b>Salida:</b> ${p.salida}</p>
<p>🛬 <b>Regreso:</b> ${p.regreso}</p>
<p>🎟 <b>Cupos disponibles:</b> ${p.disp}</p>
<p>🧳 <b>Equipaje:</b> ${p.equipaje}</p>

<h3 style="color:#0B3C8A">USD ${p.tarifa}</h3>

<label>Cupos solicitados</label>
<input id="cupos" class="input-cupos" type="number">

<br>

<button class="btn mail" onclick="mail('${p.origen}','${p.destino}','${p.compania}','${p.salida}','${p.regreso}','${p.tarifa}','${p.equipaje}')">
Consultar por Mail
</button>

<a class="btn whatsapp"
target="_blank"
href="https://wa.me/598XXXXXXXX?text=Consulta cupo ${p.origen}-${p.destino}">
WhatsApp
</a>

</div>

</div>
`

document.getElementById("modal").style.display="flex"

}

function cerrar(){
document.getElementById("modal").style.display="none"
}

function mail(origen,destino,compania,salida,regreso,tarifa,equipaje){

let cupos=document.getElementById("cupos").value

let asunto=`${origen} → ${destino}`

let cuerpo=`
Consulta de Cupos Aéreos

Ruta: ${origen} → ${destino}
Compañía: ${compania}
Salida: ${salida}
Regreso: ${regreso}
Equipaje: ${equipaje}
Tarifa: USD ${tarifa}

Cupos solicitados: ${cupos}
`

window.location.href=`mailto:TUEMAIL@MAIL.COM?subject=${encodeURIComponent(asunto)}&body=${encodeURIComponent(cuerpo)}`

}

</script>

</body>
</html>
